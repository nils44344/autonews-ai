name: Editor pass

# Daily SEO enhancement of recent articles (adds FAQs, internal links, re-pings
# IndexNow). Safe + additive — never rewrites article bodies. Runs in the cloud.
on:
  schedule:
    - cron: "30 3 * * *" # 03:30 UTC daily (≈ 09:00 IST)
  workflow_dispatch: {}

concurrency:
  group: editor-pass
  cancel-in-progress: false

jobs:
  editor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AI_PROVIDER: openai
      OPENAI_BASE_URL: https://api.groq.com/openai/v1
      OPENAI_MODEL: openai/gpt-oss-120b
      SITE_URL: https://autonews-ai.live
      INDEXNOW_KEY: 62c4c8064417c5f1b4294781fda5d215
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run editor
